site_name: Knowledge Hub
site_url: https://knowledgehub.ldt4ssc.eu/

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/logo.png   # Add your logo in docs/assets/logo.png
  features:
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    # Do not enable toc.integrate → removes right TOC
  palette:
    - scheme: default
      primary: white
      accent: amber
    - scheme: slate
      primary: teal
      accent: lime
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  favicon: assets/fav_icon_resized.png

nav:
  - Welcome: index.md
  - Strategy & Sustainability: strategy.md
  - Smart Communities Ecosystem:
    - communities_content/index.md
    - Data Spaces: communities_content/Data_Spaces_Related_Initiatives.md
    - AI for Smart Cities: communities_content/AI_For_Smart_Cities_Related_Initiatives.md
    - Local Digital Twins: communities_content/Local_Digital_Twins_Related_Initiatives.md
    - CitiVerse: communities_content/CitiVerse_Related_Initiatives.md
    - Interoperability & MIMs: communities_content/Interoperability_and_MIMs_Related_Initiatives.md
    - Cities Network: communities_content/Cities_Network_Related_Initiatives.md
  - Pilot Guidance:
    - guidance_content/index.md
    - WS1 – Interconnection of LDTs: guidance_content/ws1.md
    - WS2 – Creation of LDTs: guidance_content/ws2.md
    - WS3 – AI-Based Capabilities: guidance_content/ws3.md
  - Resources for Pilots:
    - resources_content/index.md
    - Technical Resources: resources_content/tech_resources.md
    - Non-technical Resources: resources_content/non_tech_resources.md
  # - Solar LDT Demo:
  #   - Demo: demo/index.md
  #   - How it works: demo/how-it-works.md
  # - Pilot Journey: journey/index.md  # hidden until ready for release


    
markdown_extensions:
  - admonition
  - pymdownx.details
  - md_in_html
  - toc:
      permalink: false
 # disables table of contents panel
    
extra_css:
  - assets/extra.css
  - css/resources_poc.css
  - css/methodology_diagram.css
  - css/feedback_widget.css
  - css/journey.css

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.snippets # allows embedding external content
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg

extra:
  social:
  generator: false  # hide "Made with Material for MkDocs"
  homepage: https://ldt4ssc.eu/ # logo links back to project home, instead of KH home

extra_javascript:
#  - js/footer.js
  - js/logo-top-redirect.js # script to avoid the frameset loop in the project website
  - js/frame-escape.js # script to escape the frame for all external links
  - js/papaparse.min.js # CSV parser for Google Sheets integration
  - js/resources_poc.js # test resource interactive frame
  - js/journey.js # pilot journey timeline and tracker
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js



