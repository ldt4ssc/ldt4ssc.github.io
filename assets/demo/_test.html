<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phase 1 Test Harness — Solar LDT Demo</title>
  <style>
    body        { font-family: ui-monospace, "SF Mono", Consolas, monospace; max-width: 960px; margin: 2rem auto; padding: 0 1.25rem; background: #fafafa; color: #1a1d23; }
    h1          { font-size: 1rem; font-weight: 700; border-bottom: 2px solid #e3e6eb; padding-bottom: 0.4rem; margin-bottom: 1rem; }
    h2          { font-size: 0.85rem; font-weight: 700; margin: 1.25rem 0 0.4rem; color: #5c6370; text-transform: uppercase; letter-spacing: 0.5px; }
    .pass       { color: #2e7d4f; }
    .fail       { color: #c0392b; font-weight: 600; }
    #results div { font-size: 0.8rem; line-height: 1.8; }
    #summary    { margin-top: 0.75rem; font-size: 0.85rem; font-weight: 700; }
    details     { margin-top: 0.5rem; }
    summary     { cursor: pointer; font-size: 0.8rem; color: #5c6370; user-select: none; }
    summary:hover { color: #1a1d23; }
    .curl-entry { background: #f0f2f5; border-left: 3px solid #d7dbe3; padding: 0.5rem 0.75rem; margin: 0.4rem 0; font-size: 0.72rem; white-space: pre; overflow-x: auto; line-height: 1.5; }
    .curl-label { font-weight: 700; color: #5c6370; display: block; margin-bottom: 0.2rem; }
  </style>
</head>
<body>

<h1>Solar LDT Demo — Phase 1 Test Harness</h1>
<p style="font-size:0.78rem;color:#5c6370;">
  Open DevTools → Console for detail on any failure.
  All tests should show <span class="pass">[PASS]</span>.
  This file must work when opened directly via <code>file://</code>.
</p>

<h2>Test Results</h2>
<div id="results"></div>
<div id="summary"></div>

<h2>curl Log</h2>
<details>
  <summary>Expand to see the curl command generated by each broker call (the ._curl property)</summary>
  <div id="curl-log"></div>
</details>

<script type="module">
import * as broker from './broker.js';
import { generateHistorical, generateForecast } from './solar-model.js';

// ---- Test framework ----

const $results = document.getElementById('results');
const $curl    = document.getElementById('curl-log');
let passed = 0, total = 0;

function pass(name) {
  total++; passed++;
  const el = document.createElement('div');
  el.innerHTML = `<span class="pass">[PASS]</span> ${name}`;
  $results.appendChild(el);
}

function fail(name, reason) {
  total++;
  const el = document.createElement('div');
  el.innerHTML = `<span class="fail">[FAIL: ${escHtml(reason)}]</span> ${name}`;
  $results.appendChild(el);
  console.error(`FAIL — ${name}: ${reason}`);
}

function run(name, fn) {
  try { fn(); pass(name); }
  catch (e) { fail(name, e.message); }
}

function assert(cond, msg) {
  if (!cond) throw new Error(msg || 'assertion failed');
}

function logCurl(label, curlStr) {
  if (!curlStr) return;
  const d = document.createElement('div');
  d.innerHTML = `<div class="curl-entry"><span class="curl-label">${escHtml(label)}</span>${escHtml(curlStr)}</div>`;
  $curl.appendChild(d);
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

// ---- Seed entities (satisfy all 9 ngsi-ld-authoring validation points) ----
//   1. id, type, @context present and ordered correctly
//   2. every attribute has explicit type
//   3. numeric quantities carry unitCode (MTK, KWT, DD)
//   4. observedAt on generatedPower, absent on static attrs
//   5. location is valid GeoJSON Polygon, closed, lon-lat order
//   6. IDs follow urn:ngsi-ld:Building:demo:seed-NNN
//   7. @context = [core-v1.8, ./solar-demo-context.jsonld]
//   8. every broker call populates ._curl (checked per test)
//   9. no third-party @context at runtime

const ENTITY_A = {
  "id": "urn:ngsi-ld:Building:demo:seed-001",
  "type": "Building",
  "name": { "type": "Property", "value": "Seed Building 001" },
  "location": {
    "type": "GeoProperty",
    "value": {
      "type": "Polygon",
      "coordinates": [[[6.130, 49.610], [6.140, 49.610], [6.140, 49.620], [6.130, 49.620], [6.130, 49.610]]]
    }
  },
  "rooftopArea":       { "type": "Property", "value": 200.0, "unitCode": "MTK" },
  "installedCapacity": { "type": "Property", "value": 30.0,  "unitCode": "KWT" },
  "tiltAngle":         { "type": "Property", "value": 30,    "unitCode": "DD"  },
  "generatedPower":    { "type": "Property", "value": 0.0,   "unitCode": "KWT", "observedAt": "2026-04-07T06:00:00Z" },
  "@context": [
    "https://uri.etsi.org/ngsi-ld/v1/ngsi-ld-core-context-v1.8.jsonld",
    "./solar-demo-context.jsonld"
  ]
};

const ENTITY_B = {
  "id": "urn:ngsi-ld:Building:demo:seed-002",
  "type": "Building",
  "name": { "type": "Property", "value": "Seed Building 002" },
  "location": {
    "type": "GeoProperty",
    "value": {
      "type": "Polygon",
      "coordinates": [[[6.150, 49.630], [6.160, 49.630], [6.160, 49.640], [6.150, 49.640], [6.150, 49.630]]]
    }
  },
  "rooftopArea":       { "type": "Property", "value": 150.0, "unitCode": "MTK" },
  "installedCapacity": { "type": "Property", "value": 22.0,  "unitCode": "KWT" },
  "tiltAngle":         { "type": "Property", "value": 20,    "unitCode": "DD"  },
  "generatedPower":    { "type": "Property", "value": 0.0,   "unitCode": "KWT", "observedAt": "2026-04-07T06:00:00Z" },
  "@context": [
    "https://uri.etsi.org/ngsi-ld/v1/ngsi-ld-core-context-v1.8.jsonld",
    "./solar-demo-context.jsonld"
  ]
};

// Geo query polygon that contains A's centroid [6.135, 49.615] but NOT B's [6.155, 49.635]
const GEO_QUERY = [[[6.125, 49.605], [6.145, 49.605], [6.145, 49.625], [6.125, 49.625], [6.125, 49.605]]];

// ---- Test suite ----

run('1. createEntity — entity A', () => {
  const r = broker.createEntity(ENTITY_A);
  logCurl('createEntity(A)', r._curl);
  assert(r._curl, '._curl missing');
});

run('2. createEntity — entity B', () => {
  const r = broker.createEntity(ENTITY_B);
  logCurl('createEntity(B)', r._curl);
  assert(r._curl, '._curl missing');
});

run('3. createEntity duplicate → throws', () => {
  let threw = false;
  try { broker.createEntity(ENTITY_A); } catch { threw = true; }
  assert(threw, 'should have thrown for duplicate id');
});

run('4. getEntity — NGSI-LD shape valid', () => {
  const e = broker.getEntity(ENTITY_A.id);
  logCurl('getEntity(A)', e._curl);
  assert(e.id === ENTITY_A.id,                             'id mismatch');
  assert(e.type === 'Building',                            'type mismatch');
  assert(Array.isArray(e['@context']),                     '@context not array');
  assert(e['@context'][0].includes('ngsi-ld'),             'core context missing');
  assert(e['@context'][1] === './solar-demo-context.jsonld','local context wrong');
  assert(e.installedCapacity?.type === 'Property',         'installedCapacity.type missing');
  assert(e.installedCapacity?.unitCode === 'KWT',          'installedCapacity.unitCode wrong');
  assert(e.tiltAngle?.unitCode === 'DD',                   'tiltAngle.unitCode wrong');
  assert(e.rooftopArea?.unitCode === 'MTK',                'rooftopArea.unitCode wrong');
  assert(e.generatedPower?.observedAt,                     'generatedPower.observedAt missing');
  assert(!('observedAt' in e.rooftopArea),                 'static attr rooftopArea must not have observedAt');
  assert(!('observedAt' in e.installedCapacity),           'static attr installedCapacity must not have observedAt');
  assert(e.location?.type === 'GeoProperty',               'location.type missing');
  const ring = e.location.value.coordinates[0];
  assert(ring[0][0] === ring[ring.length-1][0] && ring[0][1] === ring[ring.length-1][1], 'polygon not closed');
});

run('5. getEntity unknown id → throws', () => {
  let threw = false;
  try { broker.getEntity('urn:ngsi-ld:Building:demo:nonexistent'); } catch { threw = true; }
  assert(threw, 'should have thrown for unknown id');
});

run('6. queryEntities — type filter → 2 results', () => {
  const arr = broker.queryEntities({ type: 'Building' });
  logCurl('queryEntities(type=Building)', arr._curl);
  assert(arr.length === 2, `expected 2, got ${arr.length}`);
  assert(arr._curl, '._curl missing on result array');
});

run('7. queryEntities — geo filter → A only', () => {
  const arr = broker.queryEntities({ type: 'Building', georel: 'within', geometry: 'Polygon', coordinates: GEO_QUERY });
  logCurl('queryEntities(geo)', arr._curl);
  assert(arr.length === 1,           `expected 1 from geo filter, got ${arr.length}`);
  assert(arr[0].id === ENTITY_A.id,  'wrong entity returned from geo filter');
});

run('8. updateAttribute — generatedPower on A', () => {
  const r = broker.updateAttribute(ENTITY_A.id, 'generatedPower', 18.5, '2026-04-07T12:00:00Z');
  logCurl('updateAttribute(A, generatedPower=18.5)', r._curl);
  assert(r._curl, '._curl missing');
  const e = broker.getEntity(ENTITY_A.id);
  assert(e.generatedPower.value === 18.5, 'updated value not reflected in store');
  assert(e.generatedPower.observedAt === '2026-04-07T12:00:00Z', 'observedAt not updated');
});

run('9. updateAttribute unknown id → throws', () => {
  let threw = false;
  try { broker.updateAttribute('urn:ngsi-ld:Building:demo:ghost', 'generatedPower', 0, '2026-01-01T00:00:00Z'); }
  catch { threw = true; }
  assert(threw, 'should have thrown for unknown id');
});

run('10. getTemporalEntity — generatedPower is array', () => {
  const te = broker.getTemporalEntity(ENTITY_A.id);
  logCurl('getTemporalEntity(A)', te._curl);
  assert(Array.isArray(te.generatedPower),     'generatedPower should be array in temporal entity');
  assert(te.generatedPower.length >= 2,        `expected ≥2 observations (initial + update), got ${te.generatedPower.length}`);
  assert(te.generatedPower[0].type === 'Property', 'observation missing type field');
});

run('11. getTemporalEntity — timerel=after filters correctly', () => {
  // Add two more updates so we have observations at 13:00 and 14:00
  broker.updateAttribute(ENTITY_A.id, 'generatedPower', 20.0, '2026-04-07T13:00:00Z');
  broker.updateAttribute(ENTITY_A.id, 'generatedPower', 21.0, '2026-04-07T14:00:00Z');
  // Filter after 12:30 → should return 13:00 and 14:00 only
  const te = broker.getTemporalEntity(ENTITY_A.id, 'after', '2026-04-07T12:30:00Z');
  assert(Array.isArray(te.generatedPower),  'not an array after filter');
  assert(te.generatedPower.length === 2,    `expected 2 filtered observations, got ${te.generatedPower.length}`);
  const allAfter = te.generatedPower.every(o => o.observedAt > '2026-04-07T12:30:00Z');
  assert(allAfter, 'filter included observations before timeAt');
});

run('12. generateHistorical — 3 days, 72 entries, night = 0', () => {
  const hist = generateHistorical(ENTITY_A, 3);
  assert(hist.length === 72,                                          `expected 72, got ${hist.length}`);
  assert(hist.every(o => typeof o.value === 'number'),                'value is not a number');
  assert(hist.every(o => o.value >= 0),                              'negative power value');
  assert(hist.every(o => !isNaN(new Date(o.observedAt).getTime())), 'invalid observedAt');
  // UTC 02:00 should be night in Luxembourg (lat ~49.6°) → power = 0
  const nightObs = hist.find(o => new Date(o.observedAt).getUTCHours() === 2);
  assert(nightObs !== undefined, 'no 02:00 observation found');
  assert(nightObs.value === 0, `02:00 UTC should have 0 power, got ${nightObs.value}`);
});

run('13. generateForecast — matches weatherData length, non-negative', () => {
  const mockWeather = {
    hourly: {
      time:                 ['2026-04-07T06:00', '2026-04-07T07:00', '2026-04-07T08:00', '2026-04-07T09:00'],
      cloudcover:           [20, 30, 40, 50],
      shortwave_radiation:  [100, 300, 500, 600]
    }
  };
  const forecast = generateForecast(ENTITY_A, mockWeather);
  assert(forecast.length === 4,                                       `expected 4, got ${forecast.length}`);
  assert(forecast.every(o => typeof o.value === 'number'),            'value is not a number');
  assert(forecast.every(o => o.value >= 0),                          'negative power value');
  assert(forecast.every(o => !isNaN(new Date(o.observedAt).getTime())), 'invalid observedAt');
  // Higher radiation should give higher power (indices 3 > 2 > 1 > 0)
  assert(forecast[3].value > forecast[0].value, 'power should increase with radiation');
});

run('14. generateForecast — fallback (no radiation, uses cloudcover)', () => {
  const mockWeather = {
    hourly: {
      time:       ['2026-04-07T12:00', '2026-04-07T13:00'],
      cloudcover: [0, 100]
      // no shortwave_radiation — exercises fallback path
    }
  };
  const forecast = generateForecast(ENTITY_A, mockWeather);
  assert(forecast.length === 2,    `expected 2, got ${forecast.length}`);
  assert(forecast[0].value >= forecast[1].value, '0% cloud should produce ≥ power than 100% cloud at same hour');
});

run('15. deleteEntity — entity C round-trip', () => {
  const entityC = {
    "id":   "urn:ngsi-ld:Building:demo:seed-003",
    "type": "Building",
    "name": { "type": "Property", "value": "Temp Building C" },
    "location": { "type": "GeoProperty", "value": { "type": "Polygon", "coordinates": [[[6.200, 49.650], [6.210, 49.650], [6.210, 49.660], [6.200, 49.660], [6.200, 49.650]]] } },
    "rooftopArea":       { "type": "Property", "value": 100.0, "unitCode": "MTK" },
    "installedCapacity": { "type": "Property", "value": 15.0,  "unitCode": "KWT" },
    "tiltAngle":         { "type": "Property", "value": 25,    "unitCode": "DD"  },
    "generatedPower":    { "type": "Property", "value": 0.0,   "unitCode": "KWT", "observedAt": "2026-04-07T06:00:00Z" },
    "@context": ["https://uri.etsi.org/ngsi-ld/v1/ngsi-ld-core-context-v1.8.jsonld", "./solar-demo-context.jsonld"]
  };
  broker.createEntity(entityC);
  const beforeDelete = broker.queryEntities({ type: 'Building' });
  assert(beforeDelete.length === 3, `expected 3 before delete, got ${beforeDelete.length}`);

  const r = broker.deleteEntity(entityC.id);
  logCurl('deleteEntity(C)', r._curl);
  assert(r._curl, '._curl missing');

  const afterDelete = broker.queryEntities({ type: 'Building' });
  assert(afterDelete.length === 2, `expected 2 after delete, got ${afterDelete.length}`);

  let threw = false;
  try { broker.getEntity(entityC.id); } catch { threw = true; }
  assert(threw, 'getEntity after delete should throw');
});

run('16. exportAll — valid structure', () => {
  const exp = broker.exportAll();
  logCurl('exportAll()', exp._curl);
  assert(Array.isArray(exp.entities),           'entities not an array');
  assert(typeof exp.temporal === 'object',       'temporal not an object');
  assert(exp.entities.length === 2,             `expected 2 entities, got ${exp.entities.length}`);
  assert(exp.temporal[ENTITY_A.id]?.generatedPower?.length >= 3, 'temporal observations missing or too few');
});

run('17. importAll — round-trip restores state', () => {
  const exp = broker.exportAll();
  const result = broker.importAll(exp);
  logCurl('importAll()', result._curl);
  assert(result.count === 2, `expected count=2, got ${result.count}`);
  assert(result._curl, '._curl missing');

  const restored = broker.getEntity(ENTITY_A.id);
  assert(restored.id === ENTITY_A.id,                   'entity A id mismatch after import');
  assert(restored.installedCapacity?.value === 30.0,    'installedCapacity not restored');
  assert(Array.isArray(restored['@context']),           '@context not restored as array');

  const te = broker.getTemporalEntity(ENTITY_A.id);
  assert(Array.isArray(te.generatedPower),              'temporal generatedPower not restored');
  assert(te.generatedPower.length >= 3,                 'temporal observations count not restored');
});

run('18. _curl populated on all broker functions', () => {
  const r1 = broker.getEntity(ENTITY_A.id);
  const r2 = broker.queryEntities({ type: 'Building' });
  const r3 = broker.updateAttribute(ENTITY_A.id, 'generatedPower', 10.0, '2026-04-07T15:00:00Z');
  const r4 = broker.getTemporalEntity(ENTITY_A.id);
  const r5 = broker.exportAll();
  const r6 = broker.importAll(r5);
  assert(r1._curl, 'getEntity._curl missing');
  assert(r2._curl, 'queryEntities._curl missing');
  assert(r3._curl, 'updateAttribute._curl missing');
  assert(r4._curl, 'getTemporalEntity._curl missing');
  assert(r5._curl, 'exportAll._curl missing');
  assert(r6._curl, 'importAll._curl missing');
  // Also verify _curl is NOT enumerable (must not appear in JSON.stringify)
  const json = JSON.stringify(broker.getEntity(ENTITY_A.id));
  assert(!json.includes('_curl'), '_curl must be non-enumerable (should not appear in JSON.stringify)');
});

// ---- Summary ----
const $summary = document.getElementById('summary');
$summary.textContent = `${passed} / ${total} tests passed`;
$summary.style.color = passed === total ? '#2e7d4f' : '#c0392b';
</script>
</body>
</html>
